<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyborgID - Create Your Digital Identity</title>
    <link rel="stylesheet" href="static/styles/index_style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="top-bar">
        <div class="nav-left">
            <a href="#" onclick="scrollToTop()">Home</a>
            <a href="#" onclick="showAbout()">About Us</a>
        </div>
        <div class="nav-right">
            <a href="#" onclick="showInfo()">Info</a>
        </div>
    </nav>

    <!-- Video Header -->
    <div class="video-header">
        <video autoplay muted loop playsinline preload="auto">
            <source src="static/video/The Thing_3.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <!-- Main Content -->
    <div class="center-text">
        <p data-text="Welcome to Cyborg ID">Welcome to Cyborg ID</p>
    </div>

    <div class="buttons">
        <!-- To Application Form -->
        <a href="welcome.html" class="create-avater-button">
            Create Your Avatar
        </a>
    
        <!-- To Dialog -->
         <a href="chat.html" class="dialogue-button">
            Dialogue generation
         </a>
    </div>

    <script>
        // Smooth scroll to top
        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }

        // Show about information
        function showAbout() {
            alert('CyborgID - The future of digital identity creation. Transform yourself into a unique digital avatar.');
        }

        // Show info
        function showInfo() {
            alert('Create stunning avatars with AI-powered technology. Join the digital revolution today!');
        }

        // Add loading effect
        window.addEventListener('load', function() {
            document.body.style.opacity = '1';
        });

        // Optimize video loading
        document.addEventListener('DOMContentLoaded', function() {
            const video = document.querySelector('video');
            if (video) {
                video.addEventListener('loadstart', function() {
                    console.log('Video loading started');
                });
                
                video.addEventListener('canplay', function() {
                    console.log('Video ready to play');
                });
                
                video.addEventListener('error', function(e) {
                    console.error('Video loading error:', e);
                    // Fallback: hide video container or show alternative content
                    this.parentElement.style.background = 'linear-gradient(135deg, #000428, #004e92)';
                });
            }
        });

        // Performance optimization: Pause video when tab is not visible
        document.addEventListener('visibilitychange', function() {
            const video = document.querySelector('video');
            if (video) {
                if (document.hidden) {
                    video.pause();
                } else {
                    video.play();
                }
            }
        });
    </script>
</body>
</html>
